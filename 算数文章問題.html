<html lang="ja">
<head>

<body class="bg-emerald-50 text-gray-800 min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden min-h-[550px] flex flex-col">
        <!-- コンテンツはJSでここに描画されます -->
    </div>

<script>
// --- クイズデータ ---
const dataBasic = [
  { question: "【マインクラフト】家の壁を作るのに、最初はブロックを15個置きました。そのあと、さらに12個追加して置きました。全部で何個のブロックを置きましたか？", options: [{ text: "27個", isCorrect: true, rationale: "15と12を足すと27になります。位ごとに計算するとスムーズです。" }, { text: "25個", isCorrect: false, rationale: "15に10を足すと25ですが、さらに2を足す必要があります。" }, { text: "30個", isCorrect: false, rationale: "15の2倍は30ですが、追加したのは12個です。" }, { text: "22個", isCorrect: false, rationale: "15に12を足す計算で、十の位の計算ミスが考えられます。" }] },
  { question: "【サバイバル】ジオたちが森で木の実を30個見つけました。みんなで12個食べたとき、残りは何個になりますか？", options: [{ text: "18個", isCorrect: true, rationale: "30から12を引くと18になります。10を引いてから2を引くと計算しやすいです。" }, { text: "28個", isCorrect: false, rationale: "30から2を引いただけの状態です。" }, { text: "22個", isCorrect: false, rationale: "引き算のときに、十の位から借りてくる計算を間違えています。" }, { text: "15個", isCorrect: false, rationale: "30の半分は15ですが、食べたのは12個です。" }] },
  { question: "【マインクラフト】石炭1個でたいまつが4本作れます。石炭を5個使うと、たいまつは全部で何本作れますか？", options: [{ text: "20本", isCorrect: true, rationale: "4本ずつのグループが5つあるので、4×5で20になります。" }, { text: "9本", isCorrect: false, rationale: "4と5を足してしまっています。" }, { text: "25本", isCorrect: false, rationale: "5×5で計算してしまっている可能性があります。" }, { text: "15本", isCorrect: false, rationale: "計算ミス、または3×5で計算している可能性があります。" }] },
  { question: "【サバイバル】4人のメンバーが、それぞれ水筒に2リットルずつ水を持っています。全員合わせると何リットルになりますか？", options: [{ text: "8リットル", isCorrect: true, rationale: "2リットルが4人分なので、2×4で8になります。" }, { text: "6リットル", isCorrect: false, rationale: "2と4を足してしまっています。" }, { text: "4リットル", isCorrect: false, rationale: "人数と同じ数字になっていますが、1人2リットル持っています。" }, { text: "10リットル", isCorrect: false, rationale: "2×5、または計算ミスが考えられます。" }] },
  { question: "【マインクラフト】鉄のインゴットを50個持っていました。チェストプレートを作るのに8個使いました。残りは何個ですか？", options: [{ text: "42個", isCorrect: true, rationale: "50から8を引くと42になります。" }, { text: "48個", isCorrect: false, rationale: "50から2を引いた、または十の位がそのままになっています。" }, { text: "58個", isCorrect: false, rationale: "使ったのに足し算をしてしまっています。" }, { text: "40個", isCorrect: false, rationale: "10を引いてしまっています。" }] },
  { question: "【サバイバル】恐竜から逃げるために、最初は40メートル走りました。そのあと、さらに30メートル走りました。合計で何メートル走りましたか？", options: [{ text: "70メートル", isCorrect: true, rationale: "40と30を足すと70になります。" }, { text: "10メートル", isCorrect: false, rationale: "足し算すべきところを、引き算してしまっています。" }, { text: "80メートル", isCorrect: false, rationale: "10多く計算してしまっています。" }, { text: "100メートル", isCorrect: false, rationale: "キリの良い数字ですが、計算結果とは異なります。" }] },
  { question: "【マインクラフト】パンを12個持っています。3人のプレイヤーで同じ数ずつ分けると、1人何個になりますか？", options: [{ text: "4個", isCorrect: true, rationale: "12を3で割ると4になります。3×4=12の関係です。" }, { text: "3個", isCorrect: false, rationale: "12を4で割ったときの数です。" }, { text: "6個", isCorrect: false, rationale: "12を2で割ったときの数です。" }, { text: "5個", isCorrect: false, rationale: "あまりが出てしまう計算です。" }] },
  { question: "【サバイバル】ピピは貝殻を18個、ケイは貝殻を9個集めました。ピピはケイより何個多く集めましたか？", options: [{ text: "9個", isCorrect: true, rationale: "18から9を引くと9になります。9の2倍が18であることを利用できます。" }, { text: "27個", isCorrect: false, rationale: "違いを求めるのに足し算をしてしまっています。" }, { text: "10個", isCorrect: false, rationale: "計算ミス、または近い数字を答えています。" }, { text: "8個", isCorrect: false, rationale: "18の「8」に引きずられたミスと考えられます。" }] },
  { question: "【マインクラフト】木のフェンスを1つ作るのに、棒が4本必要です。棒を24本持っているとき、フェンスはいくつ作れますか？", options: [{ text: "6個", isCorrect: true, rationale: "24を4で割ると6になります。" }, { text: "4個", isCorrect: false, rationale: "必要な棒の数と同じ数字になっています。" }, { text: "8個", isCorrect: false, rationale: "24を3で割ったときの数です。" }, { text: "10個", isCorrect: false, rationale: "計算結果より大きくなっています。" }] },
  { question: "【サバイバル】酸素ボンベの残りが60分分あります。45分間使ったとき、残りは何分ですか？", options: [{ text: "15分", isCorrect: true, rationale: "60から45を引くと15になります。" }, { text: "25分", isCorrect: false, rationale: "引き算の計算ミスです。" }, { text: "20分", isCorrect: false, rationale: "おおよその計算ですが、正確ではありません。" }, { text: "5分", isCorrect: false, rationale: "一の位だけを引いてしまった可能性があります。" }] },
  { question: "【マインクラフト】畑に小麦を植えます。1列に6個ずつ、それを3列作りました。小麦は全部で何個植えましたか？", options: [{ text: "18個", isCorrect: true, rationale: "6×3で18になります。" }, { text: "9個", isCorrect: false, rationale: "6と3を足してしまっています。" }, { text: "24個", isCorrect: false, rationale: "6×4で計算してしまっています。" }, { text: "12個", isCorrect: false, rationale: "6×2で計算してしまっています。" }] },
  { question: "【サバイバル】宝箱が2つあります。1つの箱には金貨が10枚、もう1つの箱には金貨が15枚入っています。全部で何枚ですか？", options: [{ text: "25枚", isCorrect: true, rationale: "10と15を足すと25になります。" }, { text: "5枚", isCorrect: false, rationale: "違いを求める引き算をしてしまっています。" }, { text: "20枚", isCorrect: false, rationale: "10が2つ分と計算してしまっています。" }, { text: "30枚", isCorrect: false, rationale: "15が2つ分と計算してしまっています。" }] },
  { question: "【マインクラフト】矢を20本持っています。スケルトンを倒すのに7本使いました。残りは何本ですか？", options: [{ text: "13本", isCorrect: true, rationale: "20から7を引くと13になります。" }, { text: "17本", isCorrect: false, rationale: "10から7を引いた3を足し忘れています。" }, { text: "27本", isCorrect: false, rationale: "使ったのに足し算をしています。" }, { text: "14本", isCorrect: false, rationale: "計算ミスです。" }] },
  { question: "【サバイバル】1日に3回、決まった時間に気温を測ります。5日間で合計何回測ることになりますか？", options: [{ text: "15回", isCorrect: true, rationale: "3回×5日で15回になります。" }, { text: "8回", isCorrect: false, rationale: "3と5を足してしまっています。" }, { text: "12回", isCorrect: false, rationale: "3×4で計算してしまっています。" }, { text: "20回", isCorrect: false, rationale: "4×5などで計算してしまった可能性があります。" }] },
  { question: "【マインクラフト】村人と取引します。エメラルド1個で紙が20枚もらえます。エメラルドを3個渡すと、紙は何枚もらえますか？", options: [{ text: "60枚", isCorrect: true, rationale: "20×3で60になります。" }, { text: "23枚", isCorrect: false, rationale: "20と3を足してしまっています。" }, { text: "40枚", isCorrect: false, rationale: "20×2で計算してしまっています。" }, { text: "50枚", isCorrect: false, rationale: "20×2.5のような、あやふやな計算です。" }] },
  { question: "【サバイバル】イカダを作るのに、丸太が16本必要です。今は10本持っています。あと何本足りませんか？", options: [{ text: "6本", isCorrect: true, rationale: "16から10を引くと6になります。" }, { text: "26本", isCorrect: false, rationale: "足りない分を出すのに足し算をしています。" }, { text: "10本", isCorrect: false, rationale: "持っている数と同じになっています。" }, { text: "5本", isCorrect: false, rationale: "計算ミスです。" }] },
  { question: "【マインクラフト】羊の毛を刈ります。白い羊が8頭、黒い羊が7頭います。全部で何頭いますか？", options: [{ text: "15頭", isCorrect: true, rationale: "8と7を足すと15になります。" }, { text: "14頭", isCorrect: false, rationale: "7×2、または計算ミスです。" }, { text: "16頭", isCorrect: false, rationale: "8×2、または計算ミスです。" }, { text: "13頭", isCorrect: false, rationale: "計算ミスです。" }] },
  { question: "【サバイバル】ジャングルの道を80メートル歩く予定です。もう70メートル歩きました。残りはあと何メートルですか？", options: [{ text: "10メートル", isCorrect: true, rationale: "80から70を引くと10になります。" }, { text: "20メートル", isCorrect: false, rationale: "10多く引いてしまっているか、計算ミスです。" }, { text: "150メートル", isCorrect: false, rationale: "残りを出すのに足し算をしています。" }, { text: "30メートル", isCorrect: false, rationale: "計算ミスです。" }] },
  { question: "【マインクラフト】リンゴを18個見つけました。2個ずつ袋に入れると、袋はいくつ必要ですか？", options: [{ text: "9個", isCorrect: true, rationale: "18を2で割ると9になります。" }, { text: "8個", isCorrect: false, rationale: "18を2で割る計算ミス、または16÷2の結果です。" }, { text: "10個", isCorrect: false, rationale: "20÷2の結果、または計算ミスです。" }, { text: "7個", isCorrect: false, rationale: "計算ミスです。" }] },
  { question: "【サバイバル】火をおこすのに5分かかります。3回火をおこすと、合計で何分かかりますか？", options: [{ text: "15分", isCorrect: true, rationale: "5×3で15になります。" }, { text: "8分", isCorrect: false, rationale: "5と3を足してしまっています。" }, { text: "10分", isCorrect: false, rationale: "5×2、または計算ミスです。" }, { text: "20分", isCorrect: false, rationale: "5×4、または計算ミスです。" }] }
];

const dataCritical = [
  { question: "【マインクラフト】13個のパンを持っています。1つのチェストに3個ずつパンを入れると、チェストに入りきらないパンは何個になりますか？", options: [{ text: "1個", isCorrect: true, rationale: "13÷3=4あまり1となり、残った1個が入りきらない分になります。" }, { text: "4個", isCorrect: false, rationale: "これは「チェストの数」を答えてしまっています。聞かれているのは「パンの数」です。" }, { text: "3個", isCorrect: false, rationale: "1つのチェストに入る数と同じですが、計算結果とは異なります。" }, { text: "0個", isCorrect: false, rationale: "割り切れる計算ではありません。あまりに注目しましょう。" }] },
  { question: "【サバイバル】18人が川を渡ろうとしています。ボートには一度に4人までしか乗れません。全員が渡るには、最低でも何回ボートを動かす必要がありますか？", options: [{ text: "5回", isCorrect: true, rationale: "18÷4=4あまり2。4回では2人が残ってしまうので、もう1回動かす必要があります。" }, { text: "4回", isCorrect: false, rationale: "これだと16人しか渡れず、2人が岸に取り残されてしまいます。" }, { text: "18回", isCorrect: false, rationale: "1人ずつ運ぶなら18回ですが、4人まで乗れるのでもっと少なく済みます。" }, { text: "2回", isCorrect: false, rationale: "4×2=8人しか渡れないため、人数が足りません。" }] },
  { question: "【マインクラフト】たいくんは棒を20本持っています。ツルハシを1つ作るのに棒が2本、鉄が3個必要です。棒を全部使うと、ツルハシは最大で何個作れますか？（鉄はたくさんあるとします）", options: [{ text: "10個", isCorrect: true, rationale: "棒20本を、ツルハシ1個に必要な2本で割ると10個になります。" }, { text: "20個", isCorrect: false, rationale: "棒の数と同じですが、1つ作るのに2本使うので数は減ります。" }, { text: "3個", isCorrect: false, rationale: "ツルハシに必要な「鉄の数」と混同してしまっている可能性があります。" }, { text: "5個", isCorrect: false, rationale: "20÷4など、別の計算をしてしまっている可能性があります。" }] },
  { question: "【サバイバル】ジオは1200メートルの山道を歩きます。すでに800メートル歩きました。残りは何メートルですか？", options: [{ text: "400メートル", isCorrect: true, rationale: "1200から800を引くと400になります。" }, { text: "2000メートル", isCorrect: false, rationale: "「残り」を求めるのに、足し算をしてしまっています。" }, { text: "800メートル", isCorrect: false, rationale: "すでに歩いた距離と同じになってしまっています。" }, { text: "200メートル", isCorrect: false, rationale: "計算ミス、または桁を間違えて引いている可能性があります。" }] },
  { question: "【マインクラフト】オオカミをなつかせるのに、平均で3個の骨が必要です。骨を10個持っているとき、最大で何匹のオオカミをなつかせることができると考えられますか？", options: [{ text: "3匹", isCorrect: true, rationale: "10÷3=3あまり1。3匹までは確実になつかせることができますが、4匹目には足りません。" }, { text: "10匹", isCorrect: false, rationale: "骨1個で1匹なつくと勘違いしている可能性があります。" }, { text: "4匹", isCorrect: false, rationale: "骨が10個だと、4匹目になつかせるための骨が1個足りません。" }, { text: "1匹", isCorrect: false, rationale: "もっとたくさんのオオカミをなつかせることが可能です。" }] },
  { question: "【サバイバル】仲間へ合図を送るために、4分おきにのろしを上げます。1回目ののろしを上げてから、3回目ののろしを上げるのは、何分後になりますか？", options: [{ text: "8分後", isCorrect: true, rationale: "1回目から2回目で4分、2回目から3回目で4分なので、合計8分後です。" }, { text: "12分後", isCorrect: false, rationale: "4×3=12と計算しがちですが、最初の1回目は「0分後」なので間隔は2回分です。" }, { text: "4分後", isCorrect: false, rationale: "これは2回目ののろしを上げる時間です。" }, { text: "7分後", isCorrect: false, rationale: "4と3を足してしまっている可能性があります。" }] },
  { question: "【マインクラフト】1つのスタックは最大64個です。石のブロックを70個持っているとき、スタック数はどうなりますか？", options: [{ text: "1スタックと6個", isCorrect: true, rationale: "70から64を引くと6余るので、1スタック（64個）とあまりの6個になります。" }, { text: "1スタックと10個", isCorrect: false, rationale: "70という数字から、10個余ると勘違いしている可能性があります。" }, { text: "2スタック", isCorrect: false, rationale: "数は2つに分かれますが、2つ目は64個に満たないので「2スタック」とは呼びません。" }, { text: "70スタック", isCorrect: false, rationale: "個数とスタック数を混同してしまっています。" }] },
  { question: "【サバイバル】長さ10メートルのまっすぐな橋を作ります。2メートルおきに橋を支える柱を立てる場合、柱は全部で何本必要ですか？（橋の両端にも立てます）", options: [{ text: "6本", isCorrect: true, rationale: "10÷2=5ですが、最初の端っこ（0m地点）にも立てるので、5+1=6本になります。" }, { text: "5本", isCorrect: false, rationale: "10÷2の計算結果ですが、これだと片方の端に柱が足りなくなります。" }, { text: "4本", isCorrect: false, rationale: "間隔の数よりも少なくなってしまっています。" }, { text: "10本", isCorrect: false, rationale: "橋の長さと同じ数字ですが、2メートルおきなのでもっと少なくて済みます。" }] },
  { question: "【マインクラフト】TNTの爆発に巻き込まれない距離は5ブロック以上です。今、TNTから3ブロックの場所にいます。あと何ブロック以上離れれば安全ですか？", options: [{ text: "2ブロック以上", isCorrect: true, rationale: "安全な5ブロックから今の3ブロックを引くと、あと2ブロック必要だとわかります。" }, { text: "5ブロック以上", isCorrect: false, rationale: "これは合計の安全距離です。すでに3ブロック離れていることを忘れています。" }, { text: "8ブロック以上", isCorrect: false, rationale: "必要以上に離れすぎています。" }, { text: "3ブロック以上", isCorrect: false, rationale: "今の距離と同じになってしまっています。" }] },
  { question: "【サバイバル】食料のために魚を14匹釣りました。ジオ、ピピ、ケイの3人で同じ数ずつ分けると、あまりの魚は何匹になりますか？", options: [{ text: "2匹", isCorrect: true, rationale: "14÷3=4あまり2。同じ数ずつ分けると、最後に2匹余ります。" }, { text: "4匹", isCorrect: false, rationale: "これは「1人がもらえる魚の数」を答えてしまっています。" }, { text: "1匹", isCorrect: false, rationale: "計算ミス、または15÷3と間違えている可能性があります。" }, { text: "0匹", isCorrect: false, rationale: "3で割り切れる数ではありません。" }] },
  { question: "【マインクラフト】高さ15ブロックの塔を作ります。一度に4ブロック分だけ高く積むことができます。何回積めば、15ブロック以上の高さになりますか？", options: [{ text: "4回", isCorrect: true, rationale: "4×3=12では足りませんが、4×4=16なら15ブロックを超えます。" }, { text: "3回", isCorrect: false, rationale: "4×3=12なので、あと3ブロック足りません。" }, { text: "15回", isCorrect: false, rationale: "1回に1ブロックしか積まない場合の回数です。" }, { text: "5回", isCorrect: false, rationale: "4回で十分目標の高さに届きます。" }] },
  { question: "【サバイバル】懐中電灯の電池が90分持ちます。すでに1時間使いました。残りはあと何分使えますか？", options: [{ text: "30分", isCorrect: true, rationale: "1時間は60分なので、90から60を引くと30になります。" }, { text: "89分", isCorrect: false, rationale: "「1時間」を「1分」と勘違いして引いてしまった可能性があります。" }, { text: "60分", isCorrect: false, rationale: "使った時間の長さをそのまま答えてしまっています。" }, { text: "10分", isCorrect: false, rationale: "計算ミス、または90から80を引いてしまった可能性があります。" }] },

// 音声読み上げ機能 (Web Speech API)

function speakText(text) {
    if ('speechSynthesis' in window) {
        // 前の音声が残っていればキャンセルして摩擦をなくす
        window.speechSynthesis.cancel();
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ja-JP';
        utterance.rate = 0.85; // 少しゆっくりにして処理時間を確保
        utterance.pitch = 1.0;
        
        window.speechSynthesis.speak(utterance);
        currentUtterance = utterance;
    } else {
        alert("お使いのブラウザは音声読み上げに対応していません。");
    }
}

function stopSpeech() {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
    }
}

// 配列をシャッフルする関数
function shuffleArray(array) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// 問題文のフォーマット処理（ノイズ削減と構造化）
function formatQuestion(rawQuestion, isCenter = true) {
    let cleanText = rawQuestion.replace(/^【.*?】\s*/, '');
    
    let sentences = cleanText.split(/。/).map((s, index, arr) => {
        if (s.trim() === '') return '';
        return index !== arr.length - 1 ? s + '。' : s;
    }).filter(s => s !== '');

    const regex = /(\d+(?:\.\d+)?(?:個|本|リットル|L|メートル|m|分|人|枚|頭|回|膳|スタック|秒|時間|km|度|匹|ブロック|マス|cm|日))|(何(?:個|本|リットル|L|メートル|m|分|人|枚|頭|回|膳|スタック|秒|時間|時間何分|分何秒|km|度|匹|ブロック|マス|cm|日)|いくつ)/g;
    
    return sentences.map(s => {
        let marked = s.replace(regex, '<span class="marker-yellow">$&</span>');
        const alignClass = isCenter ? 'text-center' : 'text-left';
        return `<p class="mb-5 last:mb-0 ${alignClass}">${marked}</p>`;
    }).join('');
}

// クイズ開始ロジック
function startQuiz(type) {
    stopSpeech();
    let rawData = [];
    let limit = 0;
    
    if (type === 'basic') rawData = dataBasic;
    else if (type === 'critical') rawData = dataCritical;
    else if (type === 'mihaji') rawData = dataMihaji;
    else if (type === 'mix') {
        rawData = [...dataBasic, ...dataCritical, ...dataMihaji];
        limit = 10;
    }
    
    currentQuizData = shuffleArray(rawData).map(q => {
        return {
            question: q.question,
            options: shuffleArray(q.options)
        };
    });

    if (limit > 0) {
        currentQuizData = currentQuizData.slice(0, limit);
    }

    currentQuestionIndex = 0;
    correctCount = 0;
    renderQuestion();
}

// 2. 質問画面の描画
function renderQuestion() {
    const q = currentQuizData[currentQuestionIndex];
    const progress = Math.round(((currentQuestionIndex) / currentQuizData.length) * 100);

    let optionsHtml = '';
    q.options.forEach((opt, index) => {
        const optJson = JSON.stringify(opt).replace(/"/g, '&quot;');
        optionsHtml += `
            <button onclick="handleAnswer(${optJson})" class="w-full h-full min-h-[5rem] text-center bg-gray-50 hover:bg-emerald-50 border-2 border-gray-200 hover:border-emerald-500 text-gray-700 font-bold py-3 px-4 rounded-xl transition-all shadow-sm flex items-center justify-center text-sm sm:text-base leading-loose">
                ${opt.text}
            </button>
        `;
    });

    // 構造化された問題文のHTML生成
    const questionHtml = formatQuestion(q.question, true);
    
    // 音声読み上げ用のプレーンテキスト生成（余計なタグや記号を省く）
    const speechText = q.question.replace(/^【.*?】\s*/, '');
    const speechArg = JSON.stringify(speechText).replace(/"/g, '&quot;');

    appDiv.innerHTML = `
        <div class="bg-gray-100 px-6 py-4 flex justify-between items-center border-b border-gray-200">
            <span class="text-gray-500 font-bold">第 ${currentQuestionIndex + 1} 問 / 全 ${currentQuizData.length} 問</span>
            <button onclick="renderStartScreen()" class="text-sm text-gray-400 hover:text-gray-600 font-bold">辞める</button>
        </div>
        
        <div class="w-full bg-gray-200 h-1.5">
            <div class="bg-emerald-500 h-1.5 transition-all duration-300" style="width: ${progress}%"></div>
        </div>

        <div class="p-6 md:p-8 flex-grow flex flex-col fade-in h-full">
            
            <!-- 音声読み上げボタン -->
            <div class="flex justify-center mb-6">
                <button onclick="speakText(${speechArg})" class="bg-blue-100 hover:bg-blue-200 text-blue-700 font-bold py-2 px-5 rounded-full flex items-center shadow-sm transition-colors text-sm border border-blue-200">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5 12h4l4-4v12l-4-4H5a2 2 0 01-2-2V10a2 2 0 012-2z"></path></svg>
                    もんだいをよむ
                </button>
            </div>

            <div class="flex-grow flex flex-col justify-center mb-8">
                <div class="text-xl md:text-2xl font-bold text-gray-800 leading-loose w-full">
                    ${questionHtml}
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-3 md:gap-4 mt-auto">
                ${optionsHtml}
            </div>
        </div>
    `;
}

// 回答処理とフィードバック画面の描画
function handleAnswer(selectedOption) {
    stopSpeech(); // 選択時に音声が鳴っていれば止める
    
    const isCorrect = selectedOption.isCorrect;
    const rawQuestion = currentQuizData[currentQuestionIndex].question;
    const currentQHtml = formatQuestion(rawQuestion, false);
    
    // 解説画面用の読み上げテキスト
    const speechText = rawQuestion.replace(/^【.*?】\s*/, '');
    const speechArg = JSON.stringify(speechText).replace(/"/g, '&quot;');

    if (isCorrect) {
        correctCount++;
        confetti({
            particleCount: 100,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#34d399', '#fcd34d', '#60a5fa', '#a78bfa']
        });
    }

    const headerClass = isCorrect ? "bg-emerald-100 text-emerald-800" : "bg-red-100 text-red-800";
    const headerText = isCorrect ? "🎉 正解！" : "🤔 おしい！";
    const buttonClass = isCorrect ? "bg-emerald-600 hover:bg-emerald-700" : "bg-amber-600 hover:bg-amber-700";

    appDiv.innerHTML = `
        <div class="${headerClass} px-6 py-4 border-b">
            <h2 class="text-2xl font-bold">${headerText}</h2>
        </div>
        
        <div class="p-6 md:p-8 flex-grow flex flex-col fade-in overflow-y-auto">
            
            <div class="bg-white rounded-xl p-4 border border-gray-200 mb-4 shadow-sm relative">
                <div class="flex justify-between items-center mb-2">
                    <p class="text-gray-400 text-xs font-bold">問題</p>
                    <button onclick="speakText(${speechArg})" class="text-blue-500 hover:text-blue-700 bg-blue-50 hover:bg-blue-100 rounded p-1 flex items-center transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5 12h4l4-4v12l-4-4H5a2 2 0 01-2-2V10a2 2 0 012-2z"></path></svg>
                    </button>
                </div>
                <div class="text-gray-700 font-bold text-sm leading-loose">
                    ${currentQHtml}
                </div>
            </div>

            <p class="text-gray-500 text-sm mb-2 font-bold">選んだ答え: <span class="text-gray-800 text-base ml-2 bg-gray-100 px-3 py-1 rounded border border-gray-200">${selectedOption.text}</span></p>
            
            <div class="bg-gray-50 rounded-xl p-5 md:p-6 border border-gray-200 mb-6 flex-grow">
                <h3 class="font-bold text-gray-700 mb-3 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    解説・考え方
                </h3>
                <p class="text-gray-800 leading-loose font-bold">
                    ${selectedOption.rationale}
                </p>
            </div>
            
            <button onclick="nextQuestion()" class="w-full ${buttonClass} text-white font-bold py-4 px-6 rounded-xl shadow transition-colors mt-auto">
                ${currentQuestionIndex + 1 >= currentQuizData.length ? '結果を見る' : '次の問題へ ➔'}
            </button>
        </div>
    `;
}

// 次の問題、または結果画面へ
function nextQuestion() {
    stopSpeech(); // 遷移時の音声キャンセル
    currentQuestionIndex++;
    if (currentQuestionIndex >= currentQuizData.length) {
        renderResultScreen();
    } else {
        renderQuestion();
    }
}

// 3. 結果画面の描画
function renderResultScreen() {
    stopSpeech();
    const percentage = Math.round((correctCount / currentQuizData.length) * 100);
    let message = "";
    
    if (percentage === 100) {
        message = "パーフェクト！サバイバルマスターだ！";
        var duration = 3 * 1000;
        var end = Date.now() + duration;
        (function frame() {
            confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#34d399', '#fcd34d'] });
            confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#34d399', '#fcd34d'] });
            if (Date.now() < end) requestAnimationFrame(frame);
        }());
    }
    else if (percentage >= 80) message = "すごい！かなり生き残る力がついているね。";
    else if (percentage >= 50) message = "いい調子！解説を読んでまた挑戦してみよう。";
    else message = "ナイストライ！ここからどんどん賢くなれるよ。";

    appDiv.innerHTML = `
        <div class="bg-amber-100 text-amber-900 p-6 text-center border-b border-amber-200">
            <h1 class="text-3xl font-bold">クエスト完了！</h1>
        </div>
        <div class="p-8 flex-grow flex flex-col items-center justify-center fade-in text-center">
            
            <div class="w-32 h-32 rounded-full border-8 border-emerald-500 flex items-center justify-center mb-6 shadow-inner">
                <span class="text-4xl font-bold text-gray-800">${correctCount}<span class="text-xl text-gray-500">/${currentQuizData.length}</span></span>
            </div>
            
            <h2 class="text-xl font-bold text-gray-800 mb-2">${message}</h2>
            <p class="text-gray-600 mb-8 font-bold">正解率: ${percentage}%</p>
            
            <button onclick="renderStartScreen()" class="w-full max-w-sm bg-gray-800 hover:bg-gray-900 text-white font-bold py-4 px-6 rounded-xl shadow transition-colors">
                タイトルに戻る
            </button>
        </div>
    `;
}

// アプリの初期化
renderStartScreen();

</script>
</body>
</html>
